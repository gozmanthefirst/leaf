name: leaf-dz-db

services:
  postgres:
    image: postgres:17-alpine
    container_name: leaf-dz-pg
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: leaf-dz
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: